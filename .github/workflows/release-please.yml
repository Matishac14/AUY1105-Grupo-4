name: release-please
on:
  push:
    branches:
      - main
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          package-name: auy1105-grupo-4
          # Comienza desde v0.1.0 según la pauta de la evaluación
          initial-version: "0.1.0"